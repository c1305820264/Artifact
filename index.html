<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一点空明是何处</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 65% 45%, rgba(48, 63, 88, 0.18), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 40%),
        linear-gradient(180deg, #050608 0%, #090d12 45%, #040506 100%);
      color: #ece7db;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .page {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.05;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.45) 0.6px, transparent 0.8px),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.35) 0.6px, transparent 0.8px);
      background-size: 140px 140px, 180px 180px;
      mix-blend-mode: screen;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,0.28) 72%, rgba(0,0,0,0.58) 100%);
      z-index: 6;
    }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      width: 100%;
      height: 100%;
    }

    .left {
      width: 42%;
      min-width: 320px;
      padding: 28px 24px 22px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(236,231,219,0.55);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(42px, 6.5vw, 92px);
      line-height: 1.02;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 8px 28px rgba(0,0,0,0.38);
      margin-bottom: 18px;
    }

    .desc {
      max-width: 520px;
      font-size: clamp(16px, 1.7vw, 26px);
      line-height: 1.8;
      color: rgba(236,231,219,0.74);
    }

    .footer {
      font-size: 12px;
      line-height: 1.8;
      color: rgba(236,231,219,0.48);
      letter-spacing: 0.04em;
    }

    .stage {
      position: relative;
      flex: 1;
      overflow: hidden;
    }

    .stone-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1600px;
    }

    .stone {
      position: relative;
      width: min(48vw, 680px);
      aspect-ratio: 0.78 / 1.22;
      transform-style: preserve-3d;
      transform: translateX(7%) translateY(2%) rotateY(0deg) rotateX(0deg) scale(1);
      transition: transform 0.18s ease-out;
      filter: drop-shadow(0 28px 52px rgba(0,0,0,0.45));
      animation: stoneFloat 8s ease-in-out infinite;
    }

    .stone-img,
    .stone-shadow,
    .stone-highlight,
    .stone-glow,
    .stone-fog {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      pointer-events: none;
    }

    .stone-img {
      background-image: url('./artifact.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter:
        brightness(0.58)
        contrast(1.12)
        saturate(0.84)
        grayscale(0.18);
      opacity: 0.96;
      transform: translateZ(0);
      animation: stoneAppear 1.8s ease-out forwards;
    }

    .stone-shadow {
      background-image: url('./artifact.jpg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      filter: blur(28px) brightness(0.28);
      opacity: 0.42;
      transform: translateZ(-50px) scale(1.03) translateY(14px);
    }

    .stone-fog {
      background:
        radial-gradient(circle at 52% 45%, rgba(255,255,255,0.05), transparent 28%),
        radial-gradient(circle at 60% 58%, rgba(190,210,255,0.06), transparent 22%),
        radial-gradient(circle at 48% 68%, rgba(255,255,255,0.04), transparent 18%);
      mix-blend-mode: screen;
      filter: blur(26px);
      opacity: 0.55;
      animation: fogBreath 6s ease-in-out infinite;
    }

    .stone-glow {
      background:
        radial-gradient(circle at 54% 40%, rgba(255,245,220,0.08), transparent 16%),
        radial-gradient(circle at 58% 62%, rgba(160,190,255,0.07), transparent 14%);
      filter: blur(18px);
      opacity: 0.7;
      mix-blend-mode: screen;
    }

    .stone-highlight {
      background:
        linear-gradient(
          115deg,
          rgba(255,255,255,0) 18%,
          rgba(255,255,255,0.02) 30%,
          rgba(255,246,220,0.14) 40%,
          rgba(255,253,245,0.34) 47%,
          rgba(255,244,205,0.12) 56%,
          rgba(255,255,255,0.01) 66%,
          rgba(255,255,255,0) 74%
        );
      mix-blend-mode: screen;
      filter: blur(8px);
      opacity: 0.95;
      transform: translateX(-82%) skewX(-10deg);
      animation: lightSweep 5.6s ease-in-out infinite;
    }

    .hint {
      position: absolute;
      right: 26px;
      bottom: 22px;
      z-index: 12;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: rgba(236,231,219,0.52);
      user-select: none;
    }

    .ambient-light {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 70% 52%, rgba(135,165,255,0.10), transparent 24%),
        radial-gradient(circle at 63% 44%, rgba(255,246,220,0.07), transparent 18%);
      filter: blur(26px);
      z-index: 3;
      animation: ambientPulse 7s ease-in-out infinite;
    }

    @keyframes lightSweep {
      0%   { transform: translateX(-90%) skewX(-10deg); opacity: 0; }
      12%  { opacity: 0.20; }
      28%  { opacity: 0.92; }
      42%  { opacity: 0.38; }
      58%  { opacity: 0.08; }
      100% { transform: translateX(105%) skewX(-10deg); opacity: 0; }
    }

    @keyframes stoneAppear {
      0% {
        opacity: 0;
        filter: brightness(0.2) contrast(1.05) saturate(0.8) blur(12px);
        transform: scale(0.985);
      }
      100% {
        opacity: 0.96;
        filter: brightness(0.58) contrast(1.12) saturate(0.84) grayscale(0.18);
        transform: scale(1);
      }
    }

    @keyframes stoneFloat {
      0%, 100% { transform: translateX(7%) translateY(2%) rotateY(0deg) rotateX(0deg) scale(1); }
      50%      { transform: translateX(7%) translateY(0.8%) rotateY(0deg) rotateX(0deg) scale(1.008); }
    }

    @keyframes fogBreath {
      0%, 100% { opacity: 0.36; transform: scale(1); }
      50%      { opacity: 0.62; transform: scale(1.02); }
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.55; }
      50%      { opacity: 0.9; }
    }

    @media (max-width: 980px) {
      .content {
        flex-direction: column;
      }

      .left {
        width: 100%;
        min-width: 0;
        height: auto;
        padding: 22px 18px 0 18px;
        justify-content: flex-start;
        gap: 18px;
      }

      .stage {
        min-height: 56vh;
      }

      .stone {
        width: min(76vw, 560px);
        transform: translateX(0%) translateY(3%) rotateY(0deg) rotateX(0deg) scale(1);
      }

      h1 {
        font-size: clamp(34px, 10vw, 64px);
      }

      .desc {
        font-size: 16px;
        line-height: 1.75;
      }

      .footer {
        display: none;
      }

      .hint {
        left: 18px;
        right: auto;
        bottom: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="ambient-light"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="content">
      <section class="left">
        <div>
          <div class="eyebrow">PARTICLE STUDY / SUZHOU MUSEUM</div>
          <h1>一点空明是何处</h1>
          <p class="desc">
            光并不解释石头，只是短暂地掠过它。<br />
            洞口、褶皱、凹凸与阴影，于一瞬间显形；<br />
            而“空明”恰恰藏在这片被照亮的寂静里。
          </p>
        </div>

        <div class="footer">
          宋 苏轼《双石（并引）》 / 光扫石面交互原型
        </div>
      </section>

      <section class="stage">
        <div class="stone-wrap">
          <div class="stone" id="stone">
            <div class="stone-shadow"></div>
            <div class="stone-img"></div>
            <div class="stone-fog"></div>
            <div class="stone-glow"></div>
            <div class="stone-highlight" id="highlight"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="hint">移动鼠标，光会轻微偏转</div>
  </div>

  <script>
    const stone = document.getElementById('stone');
    const highlight = document.getElementById('highlight');

    let mouseX = window.innerWidth * 0.7;
    let mouseY = window.innerHeight * 0.5;

    let currentRotateX = 0;
    let currentRotateY = 0;
    let targetRotateX = 0;
    let targetRotateY = 0;

    let currentLightX = 0;
    let targetLightX = 0;

    function onMove(x, y) {
      mouseX = x;
      mouseY = y;

      const nx = (mouseX / window.innerWidth - 0.5);
      const ny = (mouseY / window.innerHeight - 0.5);

      targetRotateY = nx * 10;
      targetRotateX = -ny * 6;
      targetLightX = nx * 20;
    }

    window.addEventListener('mousemove', (e) => {
      onMove(e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches && e.touches[0]) {
        onMove(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    function animate() {
      currentRotateX += (targetRotateX - currentRotateX) * 0.06;
      currentRotateY += (targetRotateY - currentRotateY) * 0.06;
      currentLightX += (targetLightX - currentLightX) * 0.08;

      stone.style.transform =
        `translateX(7%) translateY(2%) rotateX(${currentRotateX}deg) rotateY(${currentRotateY}deg) scale(1)`;

      highlight.style.transform =
        `translateX(${currentLightX}%) skewX(-10deg)`;

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
