<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一点空明 - 粒子山石</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #20242a 0%, #0d0f12 55%, #060708 100%);
      color: #e8e1d1;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    #app { position: fixed; inset: 0; }
    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px 24px 20px;
      background:
        radial-gradient(circle at 50% 70%, rgba(255,255,255,0.03), transparent 35%),
        linear-gradient(to bottom, rgba(0,0,0,0.2), transparent 22%, transparent 78%, rgba(0,0,0,0.3));
    }
    .title-wrap {
      max-width: 760px;
    }
    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232,225,209,0.55);
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 74px);
      line-height: 1.06;
      letter-spacing: 0.04em;
      font-weight: 600;
      text-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .sub {
      margin-top: 10px;
      font-size: clamp(13px, 2vw, 18px);
      line-height: 1.8;
      color: rgba(232,225,209,0.72);
      max-width: 520px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
      color: rgba(232,225,209,0.60);
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 0.04em;
    }
    .hint {
      text-align: right;
      max-width: 280px;
    }
    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #060708;
      color: rgba(232,225,209,0.8);
      letter-spacing: 0.08em;
      transition: opacity 0.45s ease;
      z-index: 9;
    }
    .loading.hide { opacity: 0; pointer-events: none; }
    .credit {
      opacity: 0.74;
    }
    @media (max-width: 700px) {
      .footer {
        flex-direction: column;
        align-items: start;
      }
      .hint { text-align: left; max-width: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="loading" id="loading">山石正在显形…</div>
  <div class="overlay">
    <div class="title-wrap">
      <div class="eyebrow">Particle Study / Suzhou Museum</div>
      <h1>一点空明是何处</h1>
      <div class="sub">
        以粒子重构一块石。靠近时散，离开时聚；像气息，也像观看本身。
      </div>
    </div>
    <div class="footer">
      <div class="credit">宋 苏轼《双石（并引）》 / 交互原型</div>
      <div class="hint">拖动可轻微旋转 · 鼠标或手指靠近会扰动粒子</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const APP = document.getElementById('app');
    const LOADING = document.getElementById('loading');

    const config = {
      imageUrl: './artifact.jpg',

      crop: { x: 260, y: 560, width: 520, height: 960 },

      sampleGap: 5,
      particleSize: 2.1,
      depth: 42,
      brightnessThreshold: 172,
      edgeBoost: 16,
      drift: 1.15,
      returnSpeed: 0.045,
      damping: 0.90,
      repelRadius: 62,
      repelForce: 0.72,
      autoRotateStrength: 0.12,
      ambientPointCount: 420
    };

    let scene, camera, renderer, stoneGroup, particleSystem, ambientSystem;
    let basePositions, velocities, randomSeeds;
    let pointer = new THREE.Vector2(9999, 9999);
    let pointerDown = false;
    let rotationTargetX = 0;
    let rotationTargetY = 0;
    let clock = new THREE.Clock();

    init();

    async function init() {
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.set(0, 0, 410);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      APP.appendChild(renderer.domElement);

      scene.add(new THREE.AmbientLight(0xffffff, 0.55));

      const pointLight = new THREE.PointLight(0xf8efe1, 1.2, 1200);
      pointLight.position.set(180, 220, 320);
      scene.add(pointLight);

      const fillLight = new THREE.PointLight(0xb9c6ff, 0.35, 1000);
      fillLight.position.set(-220, -120, 180);
      scene.add(fillLight);

      stoneGroup = new THREE.Group();
      scene.add(stoneGroup);

      await buildStoneParticles();
      buildAmbientParticles();
      bindEvents();
      resize();
      animate();
      setTimeout(() => LOADING.classList.add('hide'), 300);
    }

    async function buildStoneParticles() {
      const img = await loadImage(config.imageUrl);
      const { points } = sampleImageToPoints(img);

      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(points.length * 3);
      const colors = new Float32Array(points.length * 3);
      basePositions = new Float32Array(points.length * 3);
      velocities = new Float32Array(points.length * 3);
      randomSeeds = new Float32Array(points.length);

      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const i3 = i * 3;

        positions[i3] = p.x;
        positions[i3 + 1] = p.y;
        positions[i3 + 2] = p.z;

        basePositions[i3] = p.x;
        basePositions[i3 + 1] = p.y;
        basePositions[i3 + 2] = p.z;

        const shade = p.shade / 255;
        const r = 0.72 + shade * 0.18;
        const g = 0.72 + shade * 0.16;
        const b = 0.73 + shade * 0.14;
        colors[i3] = r;
        colors[i3 + 1] = g;
        colors[i3 + 2] = b;

        randomSeeds[i] = Math.random() * Math.PI * 2;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: config.particleSize,
        vertexColors: true,
        transparent: true,
        opacity: 0.95,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });

      particleSystem = new THREE.Points(geometry, material);
      stoneGroup.add(particleSystem);
      stoneGroup.position.y = -24;
    }

    function sampleImageToPoints(img) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });

      const crop = config.crop;
      canvas.width = crop.width;
      canvas.height = crop.height;
      ctx.drawImage(
        img,
        crop.x, crop.y, crop.width, crop.height,
        0, 0, crop.width, crop.height
      );

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      const scale = Math.min(window.innerWidth * 0.42 / crop.width, window.innerHeight * 0.62 / crop.height) * 2.0;
      const worldW = crop.width * scale;
      const worldH = crop.height * scale;

      const points = [];

      function getBrightnessAt(px, py) {
        const idx = (py * canvas.width + px) * 4;
        const r = data[idx];
        const g = data[idx + 1];
        const b = data[idx + 2];
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      for (let y = 0; y < canvas.height; y += config.sampleGap) {
        for (let x = 0; x < canvas.width; x += config.sampleGap) {
          const idx = (y * canvas.width + x) * 4;
          const a = data[idx + 3];
          if (a < 10) continue;

          const r = data[idx];
          const g = data[idx + 1];
          const b = data[idx + 2];
          const brightness = 0.2126 * r + 0.7152 * g + 0.0722 * b;

          if (brightness > config.brightnessThreshold) continue;

          const bx1 = x > 1 ? getBrightnessAt(x - 1, y) : brightness;
          const bx2 = x < canvas.width - 2 ? getBrightnessAt(x + 1, y) : brightness;
          const by1 = y > 1 ? getBrightnessAt(x, y - 1) : brightness;
          const by2 = y < canvas.height - 2 ? getBrightnessAt(x, y + 1) : brightness;
          const edge = Math.abs(brightness - bx1) + Math.abs(brightness - bx2) + Math.abs(brightness - by1) + Math.abs(brightness - by2);

          const nx = (x / canvas.width - 0.5) * worldW;
          const ny = -(y / canvas.height - 0.5) * worldH;

          const darkness = (255 - brightness) / 255;
          const z = (darkness * config.depth) + (edge / 255) * config.edgeBoost + (Math.random() - 0.5) * 5.5;

          points.push({
            x: nx,
            y: ny,
            z: z - config.depth * 0.5,
            shade: brightness
          });
        }
      }

      return { points };
    }

    function buildAmbientParticles() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(config.ambientPointCount * 3);
      const colors = new Float32Array(config.ambientPointCount * 3);

      for (let i = 0; i < config.ambientPointCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 900;
        positions[i3 + 1] = (Math.random() - 0.5) * 700;
        positions[i3 + 2] = (Math.random() - 0.5) * 280;

        const c = 0.55 + Math.random() * 0.3;
        colors[i3] = c;
        colors[i3 + 1] = c * 0.98;
        colors[i3 + 2] = c * 1.04;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const material = new THREE.PointsMaterial({
        size: 1.4,
        vertexColors: true,
        transparent: true,
        opacity: 0.26,
        depthWrite: false
      });

      ambientSystem = new THREE.Points(geometry, material);
      scene.add(ambientSystem);
    }

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      if (particleSystem) {
        const positions = particleSystem.geometry.attributes.position.array;
        const worldPointer = screenToWorld(pointer.x, pointer.y);

        for (let i = 0; i < positions.length / 3; i++) {
          const i3 = i * 3;

          const ox = basePositions[i3];
          const oy = basePositions[i3 + 1];
          const oz = basePositions[i3 + 2];

          let px = positions[i3];
          let py = positions[i3 + 1];
          let pz = positions[i3 + 2];

          let vx = velocities[i3];
          let vy = velocities[i3 + 1];
          let vz = velocities[i3 + 2];

          const seed = randomSeeds[i];
          const driftX = Math.sin(t * 0.9 + seed) * config.drift * 0.32;
          const driftY = Math.cos(t * 1.1 + seed * 1.7) * config.drift * 0.46;
          const driftZ = Math.sin(t * 0.7 + seed * 0.3) * config.drift * 0.95;

          vx += ((ox + driftX) - px) * config.returnSpeed;
          vy += ((oy + driftY) - py) * config.returnSpeed;
          vz += ((oz + driftZ) - pz) * config.returnSpeed;

          const dx = px - worldPointer.x;
          const dy = py - worldPointer.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < config.repelRadius) {
            const force = (1 - dist / config.repelRadius) * config.repelForce;
            const angle = Math.atan2(dy, dx);
            vx += Math.cos(angle) * force * 1.8;
            vy += Math.sin(angle) * force * 1.8;
            vz += force * 0.9;
          }

          vx *= config.damping;
          vy *= config.damping;
          vz *= config.damping;

          px += vx;
          py += vy;
          pz += vz;

          positions[i3] = px;
          positions[i3 + 1] = py;
          positions[i3 + 2] = pz;

          velocities[i3] = vx;
          velocities[i3 + 1] = vy;
          velocities[i3 + 2] = vz;
        }

        particleSystem.geometry.attributes.position.needsUpdate = true;

        stoneGroup.rotation.y += ((rotationTargetY + Math.sin(t * 0.5) * config.autoRotateStrength) - stoneGroup.rotation.y) * 0.045;
        stoneGroup.rotation.x += ((rotationTargetX + Math.cos(t * 0.4) * 0.03) - stoneGroup.rotation.x) * 0.045;
      }

      if (ambientSystem) {
        ambientSystem.rotation.y += 0.0008;
        ambientSystem.rotation.x = Math.sin(t * 0.15) * 0.08;
      }

      renderer.render(scene, camera);
    }

    function screenToWorld(clientX, clientY) {
      if (!isFinite(clientX) || !isFinite(clientY)) return { x: 9999, y: 9999 };

      const ndc = new THREE.Vector3(
        (clientX / window.innerWidth) * 2 - 1,
        -(clientY / window.innerHeight) * 2 + 1,
        0.5
      );

      ndc.unproject(camera);
      const dir = ndc.sub(camera.position).normalize();
      const distance = -camera.position.z / dir.z;
      const pos = camera.position.clone().add(dir.multiplyScalar(distance));

      return { x: pos.x, y: pos.y };
    }

    function bindEvents() {
      window.addEventListener('resize', resize);

      window.addEventListener('pointermove', (e) => {
        pointer.set(e.clientX, e.clientY);
        if (pointerDown) {
          rotationTargetY += e.movementX * 0.0028;
          rotationTargetX += e.movementY * 0.0016;
          rotationTargetX = clamp(rotationTargetX, -0.55, 0.55);
          rotationTargetY = clamp(rotationTargetY, -0.95, 0.95);
        }
      });

      window.addEventListener('pointerdown', () => {
        pointerDown = true;
      });

      window.addEventListener('pointerup', () => {
        pointerDown = false;
      });

      window.addEventListener('pointerleave', () => {
        pointer.set(9999, 9999);
        pointerDown = false;
      });

      window.addEventListener('touchend', () => {
        pointer.set(9999, 9999);
      });
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }
  </script>
</body>
</html>
