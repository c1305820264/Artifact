<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一点空明是何处</title>
  <style>
    :root{
      --bg1:#040507;
      --bg2:#0a0d12;
      --ink:#ece6d8;
      --muted:rgba(236,230,216,.72);
      --soft:rgba(236,230,216,.42);
      --line:rgba(236,230,216,.14);
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 68% 42%, rgba(120,150,255,.10), transparent 26%),
        radial-gradient(circle at 70% 52%, rgba(255,241,204,.07), transparent 18%),
        linear-gradient(180deg,var(--bg2) 0%,var(--bg1) 100%);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
    }

    .page{
      position:relative;
      width:100%;
      height:100%;
      isolation:isolate;
    }

    .grain,
    .vignette,
    .ambient{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .grain{
      opacity:.05;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.40) .7px, transparent .9px),
        radial-gradient(circle at 70% 70%, rgba(255,255,255,.28) .7px, transparent .9px);
      background-size:160px 160px,210px 210px;
      mix-blend-mode:screen;
      z-index:0;
    }

    .ambient{
      background:
        radial-gradient(circle at 68% 44%, rgba(141,170,255,.12), transparent 24%),
        radial-gradient(circle at 64% 48%, rgba(255,248,226,.10), transparent 14%);
      filter:blur(30px);
      animation:pulse 7s ease-in-out infinite;
      z-index:0;
    }

    .vignette{
      background:
        radial-gradient(circle at center, transparent 48%, rgba(0,0,0,.28) 72%, rgba(0,0,0,.55) 100%);
      z-index:3;
    }

    .layout{
      position:relative;
      z-index:5;
      display:grid;
      grid-template-columns:minmax(320px, 36vw) 1fr;
      height:100%;
      gap:2vw;
      padding:28px 30px 22px;
    }

    .copy{
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      min-width:0;
    }

    .titleBlock{
      max-width:560px;
      margin-top:5vh;
    }

    .meta{
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color:var(--soft);
      margin-bottom:22px;
    }

    h1{
      margin:0;
      font-size:clamp(42px, 6.4vw, 96px);
      line-height:.96;
      letter-spacing:.04em;
      font-weight:700;
      text-shadow:0 10px 28px rgba(0,0,0,.32);
    }

    .rule{
      width:72px;
      height:1px;
      background:var(--line);
      margin:24px 0 18px;
    }

    .desc{
      margin:0;
      max-width:30em;
      font-size:clamp(16px, 1.35vw, 22px);
      line-height:1.95;
      color:var(--muted);
    }

    .footer{
      display:flex;
      flex-direction:column;
      gap:8px;
      font-size:12px;
      color:var(--soft);
      letter-spacing:.04em;
    }

    .footer .label{
      color:rgba(236,230,216,.80);
    }

    .stage{
      position:relative;
      min-width:0;
      overflow:hidden;
    }

    .stoneWrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      perspective:1600px;
    }

    .stone{
      position:relative;
      width:min(42vw, 620px);
      aspect-ratio:.72 / 1;
      transform-style:preserve-3d;
      animation:float 8s ease-in-out infinite;
      filter:drop-shadow(0 28px 54px rgba(0,0,0,.44));
      transition:transform .16s ease-out;
    }

    .stoneShadow,
    .stoneLayer,
    .stoneMist,
    .stoneGlow,
    .stoneLight{
      position:absolute;
      inset:0;
      pointer-events:none;
      background-repeat:no-repeat;
      background-position:center;
      background-size:contain;
    }

    .stoneShadow{
      background-image:url('./stone_cutout.png');
      filter:blur(28px) brightness(.12);
      opacity:.62;
      transform:translateY(22px) translateZ(-36px) scale(1.04);
    }

    .stoneLayer{
      background-image:url('./stone_cutout.png');
      filter:brightness(.62) contrast(1.15) saturate(.84);
      opacity:.98;
      animation:appear 1.7s ease-out forwards;
    }

    .stoneMist{
      background:
        radial-gradient(circle at 50% 44%, rgba(255,255,255,.05), transparent 22%),
        radial-gradient(circle at 55% 58%, rgba(162,190,255,.06), transparent 18%);
      filter:blur(26px);
      mix-blend-mode:screen;
      opacity:.62;
      animation:mist 6s ease-in-out infinite;
    }

    .stoneGlow{
      background:
        radial-gradient(circle at 52% 41%, rgba(255,242,213,.10), transparent 16%),
        radial-gradient(circle at 55% 61%, rgba(164,192,255,.08), transparent 14%);
      filter:blur(18px);
      mix-blend-mode:screen;
      opacity:.75;
    }

    .stoneLight{
      background:linear-gradient(
        112deg,
        rgba(255,255,255,0) 12%,
        rgba(255,255,255,.015) 23%,
        rgba(255,245,224,.12) 33%,
        rgba(255,252,244,.35) 43%,
        rgba(255,244,212,.14) 52%,
        rgba(255,255,255,.015) 62%,
        rgba(255,255,255,0) 74%
      );
      filter:blur(8px);
      mix-blend-mode:screen;
      transform:translateX(-78%) skewX(-10deg);
      opacity:.95;
      animation:sweep 5.8s ease-in-out infinite;
    }

    .sideNote{
      position:absolute;
      left:30px;
      bottom:18px;
      z-index:8;
      color:rgba(236,230,216,.30);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .hint{
      position:absolute;
      right:22px;
      bottom:18px;
      z-index:8;
      color:var(--soft);
      font-size:12px;
      letter-spacing:.04em;
    }

    @keyframes sweep{
      0%{
        transform:translateX(-84%) skewX(-10deg);
        opacity:0;
      }
      10%{
        opacity:.18;
      }
      28%{
        opacity:.95;
      }
      44%{
        opacity:.34;
      }
      58%{
        opacity:.06;
      }
      100%{
        transform:translateX(104%) skewX(-10deg);
        opacity:0;
      }
    }

    @keyframes appear{
      0%{
        opacity:0;
        filter:brightness(.2) contrast(1.05) blur(10px);
      }
      100%{
        opacity:.98;
        filter:brightness(.62) contrast(1.15) saturate(.84);
      }
    }

    @keyframes mist{
      0%,100%{
        opacity:.36;
        transform:scale(1);
      }
      50%{
        opacity:.62;
        transform:scale(1.025);
      }
    }

    @keyframes pulse{
      0%,100%{
        opacity:.52;
      }
      50%{
        opacity:.90;
      }
    }

    @keyframes float{
      0%,100%{
        transform:translateY(1.5%) scale(1);
      }
      50%{
        transform:translateY(0%) scale(1.008);
      }
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
        grid-template-rows:auto 1fr;
        gap:10px;
        padding:18px 18px 16px;
      }

      .copy{
        justify-content:flex-start;
        gap:18px;
      }

      .titleBlock{
        margin-top:0;
      }

      .footer{
        display:none;
      }

      .stage{
        min-height:54vh;
      }

      .stone{
        width:min(74vw, 520px);
      }

      h1{
        font-size:clamp(34px, 11vw, 66px);
      }

      .desc{
        font-size:15px;
        line-height:1.9;
      }

      .sideNote{
        display:none;
      }

      .hint{
        left:18px;
        right:auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="ambient"></div>
    <div class="grain"></div>
    <div class="vignette"></div>

    <div class="layout">
      <section class="copy">
        <div class="titleBlock">
          <div class="meta">Suzhou Museum / Light Study</div>
          <h1>一点空明<br>是何处</h1>
          <div class="rule"></div>
          <p class="desc">
            光并不解释石头，只是短暂地掠过它。<br>
            洞口、褶皱、凹凸与阴影，于一瞬间显形；<br>
            而“空明”恰恰藏在这片被照亮的寂静里。
          </p>
        </div>

        <div class="footer">
          <div class="label">宋 苏轼《双石（并引）》</div>
          <div>Interaction Prototype / Artifact Study</div>
        </div>
      </section>

      <section class="stage">
        <div class="stoneWrap">
          <div class="stone" id="stone">
            <div class="stoneShadow"></div>
            <div class="stoneLayer"></div>
            <div class="stoneMist"></div>
            <div class="stoneGlow"></div>
            <div class="stoneLight" id="stoneLight"></div>
          </div>
        </div>
      </section>
    </div>

    <div class="sideNote">Stone · Void · Light</div>
    <div class="hint">移动鼠标，光会轻微偏转</div>
  </div>

  <script>
    const stone = document.getElementById('stone');
    const stoneLight = document.getElementById('stoneLight');

    let targetRX = 0;
    let targetRY = 0;
    let curRX = 0;
    let curRY = 0;

    let targetLight = 0;
    let curLight = 0;

    function handleMove(x, y){
      const nx = x / window.innerWidth - 0.5;
      const ny = y / window.innerHeight - 0.5;

      targetRY = nx * 9;
      targetRX = -ny * 5;
      targetLight = nx * 20;
    }

    window.addEventListener('mousemove', (e) => {
      handleMove(e.clientX, e.clientY);
    });

    window.addEventListener('touchmove', (e) => {
      if (e.touches && e.touches[0]) {
        handleMove(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: true });

    function tick(){
      curRX += (targetRX - curRX) * 0.06;
      curRY += (targetRY - curRY) * 0.06;
      curLight += (targetLight - curLight) * 0.08;

      stone.style.transform = `translateY(1.5%) rotateX(${curRX}deg) rotateY(${curRY}deg)`;
      stoneLight.style.transform = `translateX(${curLight}%) skewX(-10deg)`;

      requestAnimationFrame(tick);
    }

    tick();
  </script>
</body>
</html>
